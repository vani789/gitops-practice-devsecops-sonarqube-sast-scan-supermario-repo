name: "Build and push Super Mario Docker image with dynamic tag to Docker Hub"
# on:
#   push:
#     branches:
#       - main

jobs:
  build_push_supermario_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Read version and set tag
        id: version
        run: |
          VERSION=$(($(cat version.txt) + 1))
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: docker.io/vani0909/supermariogitopsproject:${{ steps.version.outputs.tag }}
