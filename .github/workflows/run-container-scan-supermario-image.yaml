name: "Run Container Scan on Super Mario Docker Image with Quality Gate"

# on:
#   push:
#     branches:
#       - main

jobs:
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Read version and set tag
        id: version
        run: |
          VERSION=$(($(cat version.txt) + 1))
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Docker Image from Docker Hub
        run: |
          docker pull docker.io/vani0909/supermariogitopsproject:${{ steps.version.outputs.tag }}
          docker save -o supermariolatestdockerimage.tar docker.io/vani0909/supermariogitopsproject:${{ steps.version.outputs.tag }}

      - name: Run Trivy vulnerability scanner in tarball mode
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          input: supermariolatestdockerimage.tar
          exit-code: '0'
          severity: 'CRITICAL,HIGH'